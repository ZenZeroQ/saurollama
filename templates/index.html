<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA AGENTE: DELLSAURIO</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0a0a0a;
        }
        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 { text-shadow: 0 0 10px var(--neon-green); }
        
        /* Ventana de Estado */
        #status-bar {
            border: 1px solid var(--neon-green);
            width: 90%;
            max-width: 800px;
            padding: 8px;
            margin-bottom: 15px;
            font-size: 0.85em;
            background: rgba(0, 255, 65, 0.05);
            display: flex;
            justify-content: space-around;
        }

        #chat-container {
            border: 1px solid var(--neon-green);
            width: 90%;
            max-width: 800px;
            height: 60vh;
            overflow-y: auto;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: inset 0 0 20px rgba(0, 255, 65, 0.2);
        }
        .input-area {
            width: 90%;
            max-width: 800px;
            display: flex;
            margin-top: 15px;
        }
        input {
            flex-grow: 1;
            background: black;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px;
            outline: none;
        }
        button {
            background: var(--neon-green);
            color: black;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 5px;
        }
        .msg-ia { color: #00ff41; font-weight: bold; }
        .msg-user { color: #008f11; }
        .debug-msg { color: #555; font-size: 0.8em; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>SISTEMA AGENTE: DELLSAURIO</h1>

    <div id="status-bar">
        <span>[SYSTEM_ID: DELL-LATITUDE]</span>
        <span>[CPU: <span id="cpu-stat">--%</span>]</span>
        <span>[RAM: <span id="ram-stat">--%</span>]</span>
    </div>

    <div id="chat-container" id="chat-box">
        </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Escribe al agente..." autocomplete="off">
        <button onclick="sendMessage()">ENVIAR</button>
    </div>

    <script>
        // Función para enviar mensaje
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatContainer = document.getElementById('chat-container');
            const message = inputField.value.trim();

            if (!message) return;

            // 1. Mostrar mensaje del usuario y LIMPIAR cuadro
            chatContainer.innerHTML += `<p class="msg-user">> Tú: ${message}</p>`;
            inputField.value = ''; // Aquí se limpia el cuadro inmediatamente

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                // 2. Actualizar barra de estado
                if (data.sys_status) {
                    const stats = data.sys_status.split('|');
                    document.getElementById('cpu-stat').innerText = stats[0].split(':')[1].trim();
                    document.getElementById('ram-stat').innerText = stats[1].split(':')[1].trim();
                }

                // 3. Mostrar Debug e IA
                chatContainer.innerHTML += `<p class="debug-msg">[DEBUG]: INTENT -> ${data.debug}</p>`;
                chatContainer.innerHTML += `<p class="msg-ia">> DellSaurio: ${data.response}</p>`;

                // Auto-scroll al fondo
                chatContainer.scrollTop = chatContainer.scrollHeight;

            } catch (error) {
                console.error("Error en la conexión:", error);
                chatContainer.innerHTML += `<p style="color:red">> [ERROR DE SISTEMA]</p>`;
            }
        }

        // 4. CORRECCIÓN TECLA ENTER
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
